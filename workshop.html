<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&H Workshop - 繳交端</title>
    <!-- Add Google Web Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Noto+Sans+TC:wght@300;500;700;900&family=JetBrains+Mono:wght@800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --primary: #2d3436;
            --primary-dark: #1e2527;
            --bg-dark: #fcfcfc;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #2d3436;
            --text-muted: #636e72;
            --accent-blue: #0984e3;
            --accent-purple: #6c5ce7;
            --accent-green: #00b894;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(108, 92, 231, 0.08) 0px, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(9, 132, 227, 0.08) 0px, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8) 0%, transparent 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .workshop-client-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.06), inset 0 0 0 1px rgba(255, 255, 255, 0.8);
            width: 100%;
            max-width: 520px;
            padding: 50px 40px;
            text-align: center;
            position: relative;
            z-index: 1;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Status Badge Enhancements */
        .status-pill {
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .status-waiting {
            background: rgba(254, 226, 226, 0.8);
            color: #ef4444;
            border: 1px solid rgba(254, 202, 202, 0.8);
        }

        .status-active {
            background: rgba(220, 252, 231, 0.8);
            color: var(--accent-green);
            border: 1px solid rgba(187, 247, 208, 0.8);
            animation: statusPulse 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes statusPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        /* Timer Enhancements */
        .timer-display {
            font-size: 5.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0 35px 0;
            letter-spacing: -3px;
            font-family: 'JetBrains Mono', monospace;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.05));
            transition: all 0.3s;
            line-height: 1;
        }

        .timer-display.text-danger {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textFlash 1s infinite alternate;
        }

        @keyframes textFlash {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0.8;
                transform: scale(1.02);
            }
        }

        /* Input Fields */
        .login-input {
            background: rgba(248, 250, 252, 0.7);
            border: 2px solid rgba(226, 232, 240, 0.8);
            border-radius: 20px;
            padding: 20px;
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            width: 100%;
            margin-bottom: 30px;
            letter-spacing: 12px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--primary-dark);
            font-family: 'JetBrains Mono', monospace;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .login-input:focus {
            border-color: var(--accent-blue);
            background: #ffffff;
            outline: none;
            box-shadow: 0 0 0 5px rgba(9, 132, 227, 0.1), inset 0 2px 5px rgba(0, 0, 0, 0.02);
            transform: translateY(-2px);
        }

        .login-input::placeholder {
            color: #cbd5e1;
            letter-spacing: 4px;
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transform: translateY(-5px);
            display: inline-block;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            padding: 50px 20px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            background: rgba(248, 250, 252, 0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 220px;
        }

        .upload-area:hover:not(.disabled),
        .upload-area.dragover {
            border-color: var(--accent-purple);
            background: rgba(108, 92, 231, 0.04);
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(108, 92, 231, 0.1);
        }

        .upload-area.disabled {
            cursor: not-allowed;
            opacity: 0.5;
            filter: grayscale(0.5);
        }

        .upload-icon {
            font-size: 4.5rem;
            color: #cbd5e1;
            margin-bottom: 15px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            line-height: 1;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
        }

        .upload-area:hover .upload-icon,
        .upload-area.dragover .upload-icon {
            color: var(--accent-purple);
            transform: translateY(-8px) scale(1.1);
            filter: drop-shadow(0 10px 15px rgba(108, 92, 231, 0.2));
        }

        .preview-img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 16px;
            display: none;
            object-fit: contain;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        #file-input {
            display: none;
        }

        /* Buttons */
        .btn-submit {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #3d4a4d 100%);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 18px;
            width: 100%;
            font-weight: 800;
            font-size: 1.15rem;
            margin-top: 25px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(45, 52, 54, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.4s ease;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(45, 52, 54, 0.3);
        }

        .btn-submit:hover:not(:disabled)::after {
            left: 100%;
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
            background: #94a3b8;
        }

        /* Success Overlay */
        .success-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--accent-green);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .success-overlay i {
            display: inline-block;
            animation: bounceScale 1s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 10px 15px rgba(0, 184, 148, 0.3));
        }

        @keyframes bounceScale {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .team-display-pill {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 10px;
            font-size: 1.4rem;
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.3);
            letter-spacing: 1px;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stage Transitions */
        #auth-section,
        #submission-section {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .header-title {
            font-weight: 900;
            font-size: 30px;
            letter-spacing: -0.5px;
        }

        /* File Info */
        .file-info {
            display: none;
            margin-top: 15px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-dark);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.4s;
            z-index: 2;
        }

        .upload-text-group {
            transition: all 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Alert Dialog */
        .custom-dialog-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .custom-dialog-mask.show {
            display: flex;
            opacity: 1;
        }

        .custom-dialog {
            background: white;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Image Rotate Tool */
        .rotate-bar {
            display: none;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
            animation: fadeIn 0.3s;
        }

        .rotate-btn {
            background: rgba(108, 92, 231, 0.1);
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 12px;
            padding: 8px 18px;
            font-weight: 700;
            color: var(--accent-purple);
            cursor: pointer;
            transition: all 0.3s;
        }

        .rotate-btn:hover {
            background: rgba(108, 92, 231, 0.2);
            transform: scale(1.05);
        }

        /* Member List Pills */
        .member-list-wrap {
            display: none;
            margin-top: 18px;
            animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .member-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .member-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .member-pill {
            background: rgba(108, 92, 231, 0.08);
            border: 1px solid rgba(108, 92, 231, 0.15);
            border-radius: 50px;
            padding: 5px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-purple);
        }

        .member-pill.me {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3);
        }

        /* Upload Loading Animation */
        .upload-anim-wrap {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 30px 0;
        }

        .upload-cloud {
            font-size: 4rem;
            animation: cloudBounce 1s infinite alternate;
            line-height: 1;
        }

        .upload-plane {
            font-size: 1.8rem;
            animation: planeFlying 1.5s infinite linear;
        }

        @keyframes cloudBounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-10px);
            }
        }

        @keyframes planeFlying {
            0% {
                transform: translateX(-60px) translateY(10px);
                opacity: 0;
            }

            40% {
                opacity: 1;
            }

            100% {
                transform: translateX(60px) translateY(-10px);
                opacity: 0;
            }
        }

        /* Closed State Overlay */
        .closed-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 30px;
        }

        .closed-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        /* Mobile improvements */
        @media (max-width: 576px) {
            .workshop-client-card {
                padding: 30px 20px;
                border-radius: 24px;
            }

            .timer-display {
                font-size: 4rem;
            }

            .btn-submit {
                padding: 15px;
                font-size: 1rem;
            }

            .team-display-pill {
                font-size: 1.1rem;
                padding: 10px 25px;
            }
        }
    </style>
</head>

<body>

    <div class="workshop-client-card">
        <div id="status-badge" class="status-pill status-waiting">等待開始</div>

        <h1 class="header-title mb-1 text-dark">A&H Workshop</h1>
        <p class="text-muted small mb-4 fw-600">A&H工作坊 繳交端</p>

        <!-- Stage 1: Auth -->
        <div id="auth-section">
            <div class="text-center mb-4 mt-2">
                <i class="bi bi-shield-lock text-primary display-4 opacity-75"
                    style="color: var(--accent-purple) !important;"></i>
                <h4 class="fw-bold mt-3">身份驗證</h4>
                <p class="text-muted small">請輸入您的 AGCODE 以辨識分組</p>
            </div>
            <input type="text" id="agcode-input" class="login-input" placeholder="000000" maxlength="10">
            <button class="btn-submit" onclick="loginByAGCODE()">
                <i class="bi bi-person-check-fill fs-5"></i> 確認
            </button>
        </div>

        <!-- Closed Overlay -->
        <div id="closed-overlay" class="closed-overlay">
            <div class="closed-icon">🔒</div>
            <h2 class="fw-950 mb-3">上傳期間已結束</h2>
            <p class="fs-5 opacity-75 mb-4">感謝您的積極參與！<br>如需協助請舉手。</p>
            <div class="badge bg-white text-dark px-4 py-3 fs-6 fw-bold rounded-pill shadow">A&H Workshop 已關閉</div>
        </div>

        <!-- Stage 2: Submission -->
        <div id="submission-section" style="display: none; opacity: 0; transform: translateY(20px);">
            <div id="team-info" class="team-display-pill">--</div>

            <!-- Member list -->
            <div id="member-list-wrap" class="member-list-wrap">
                <div class="member-label">小組成員</div>
                <div id="member-pills-container" class="member-pills"></div>
            </div>

            <div id="countdown" class="timer-display">--:--</div>

            <div id="interactive-form">
                <div id="upload-zone" class="upload-area">
                    <div class="upload-text-group text-center">
                        <div class="upload-icon"><i class="bi bi-cloud-arrow-up-fill"></i></div>
                        <div class="fw-bold text-dark fs-5 mb-1">點擊或拖放檔案</div>
                        <div class="text-muted small">支援圖片格式 (PNG, JPG)</div>
                    </div>
                    <input type="file" id="file-input" accept="image/*">

                    <img id="preview" class="preview-img">
                    <div id="file-name" class="file-info"><i class="bi bi-image"></i>&nbsp; <span>--</span></div>

                    <div id="success-mask" class="success-overlay">
                        <i class="bi bi-check-circle-fill display-2 mb-3"></i>
                        <div class="fw-900 fs-3 mb-1 text-dark">繳交成功</div>
                        <div class="small fw-bold text-muted">上傳完成</div>
                    </div>

                    <!-- Upload in-progress animation -->
                    <div id="upload-anim" class="upload-anim-wrap">
                        <div class="upload-cloud">☁️</div>
                        <div class="upload-plane">✈️</div>
                        <div class="fw-bold text-muted small">圖片傳輸中...</div>
                    </div>
                </div>

                <!-- Image rotate bar -->
                <div id="rotate-bar" class="rotate-bar">
                    <button class="rotate-btn" onclick="rotatePreview(-90)"><i class="bi bi-arrow-counterclockwise"></i>
                        向左旋轉</button>
                    <button class="rotate-btn" onclick="rotatePreview(90)"><i class="bi bi-arrow-clockwise"></i>
                        向右旋轉</button>
                </div>

                <button id="submit-btn" class="btn-submit" onclick="submitFile()" disabled>
                    <i class="bi bi-send-fill fs-5"></i> 確認並提交
                </button>
            </div>

            <button class="btn btn-link btn-sm text-muted mt-4 text-decoration-none fw-bold"
                onclick="location.reload()">
                <i class="bi bi-arrow-left"></i> 切換人員
            </button>
        </div>
    </div>

    <!-- Custom Alert Overlay -->
    <div id="custom-alert-mask" class="custom-dialog-mask" onclick="if(event.target===this) closeCustomAlert()">
        <div class="custom-dialog">
            <i class="bi bi-info-circle-fill fs-1 text-primary mb-3 d-inline-block"></i>
            <h4 class="fw-900 mb-2">系統提示</h4>
            <p id="custom-alert-msg" class="text-muted fw-bold mb-4"></p>
            <button class="btn btn-dark w-100 rounded-pill py-3 fw-bold fs-6" onclick="closeCustomAlert()">確定</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz4kiWGCG96zZHAJgc-wOAaCxOkS7WXf5IriAEKk0StXYFNVlME7x2SjaSva3Rp8obX/exec';
        let sessionStatus = null;
        let base64File = null;
        let myTeam = null;

        function showCustomAlert(msg) {
            document.getElementById('custom-alert-msg').innerText = msg;
            const mask = document.getElementById('custom-alert-mask');
            mask.style.display = 'flex';
            // Trigger reflow
            void mask.offsetWidth;
            mask.classList.add('show');
        }

        function closeCustomAlert() {
            const mask = document.getElementById('custom-alert-mask');
            mask.classList.remove('show');
            setTimeout(() => { mask.style.display = 'none'; }, 300);
        }

        // Listen for enter key in login
        document.getElementById('agcode-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') loginByAGCODE();
        });

        // Setup Drag and Drop
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');

        uploadZone.addEventListener('click', () => {
            // Only allow click if not yet successfully submitted
            if (!document.getElementById('success-mask').classList.contains('active')) {
                fileInput.click();
            }
        });

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (!document.getElementById('success-mask').classList.contains('active')) {
                uploadZone.classList.add('dragover');
            }
        });

        uploadZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');

            if (document.getElementById('success-mask').classList.contains('active')) return;

            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFileSelect(file);
            } else {
                showCustomAlert('請上傳有效的圖片檔案格式 (PNG, JPG)。');
            }
        });

        fileInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) handleFileSelect(file);
        });

        let rotationDeg = 0;

        function handleFileSelect(file) {
            const reader = new FileReader();
            reader.onload = function (event) {
                const originalSrc = event.target.result;
                const preview = document.getElementById('preview');
                const textGroup = document.querySelector('.upload-text-group');
                const fileName = document.getElementById('file-name');
                const rotateBar = document.getElementById('rotate-bar');

                rotationDeg = 0;
                preview.style.transform = 'rotate(0deg)';
                preview.src = originalSrc;
                preview._originalSrc = originalSrc;
                preview.style.display = 'block';

                textGroup.style.display = 'none';
                fileName.style.display = 'flex';
                fileName.querySelector('span').textContent = file.name;
                rotateBar.style.display = 'flex';

                base64File = originalSrc;
                document.getElementById('submit-btn').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        function rotatePreview(degrees) {
            rotationDeg = (rotationDeg + degrees + 360) % 360;
            const preview = document.getElementById('preview');
            preview.style.transform = `rotate(${rotationDeg}deg)`;

            // Re-encode the image with the new rotation applied
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.onload = function () {
                const rad = rotationDeg * Math.PI / 180;
                const sin = Math.abs(Math.sin(rad));
                const cos = Math.abs(Math.cos(rad));
                canvas.width = img.height * sin + img.width * cos;
                canvas.height = img.height * cos + img.width * sin;
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(rad);
                ctx.drawImage(img, -img.width / 2, -img.height / 2);
                ctx.restore();
                base64File = canvas.toDataURL('image/jpeg', 0.9);
            };
            img.src = preview._originalSrc;
        }

        async function callAPI(action, args = []) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, args })
                });
                return await response.json();
            } catch (err) {
                console.error('API Error:', err);
                return { success: false, message: '網路連線異常' };
            }
        }

        async function loginByAGCODE() {
            const code = document.getElementById('agcode-input').value.trim();
            if (!code) return showCustomAlert('請輸入您的 AGCODE');

            const btn = document.querySelector('#auth-section .btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 系統驗證中...';

            // 1. Fetch live state to see teams/members
            const stateRes = await callAPI('getWorkshopState');
            if (!stateRes.success || !stateRes.state) {
                showCustomAlert('系統尚未就緒。');
                btn.disabled = false; return btn.innerHTML = '<i class="bi bi-person-check-fill fs-5"></i> 進入系統';
            }
            sessionStatus = stateRes.state;

            // Check if within submission deadline
            if (!sessionStatus.active || !sessionStatus.startTime) {
                showCustomAlert('目前非繳交期間，無法登入。');
                btn.disabled = false; return btn.innerHTML = '<i class="bi bi-person-check-fill fs-5"></i> 進入系統';
            }
            const elapsedSec = Math.floor((Date.now() - sessionStatus.startTime) / 1000);
            const remainSec = sessionStatus.limit - elapsedSec;
            if (remainSec <= 0) {
                showCustomAlert('⏳ 繳交期限已過，已關閉上傳權限。無法進入繳交頁面。');
                btn.disabled = false; return btn.innerHTML = '<i class="bi bi-person-check-fill fs-5"></i> 進入系統';
            }

            // 2. Fetch master list to identify person by AGCODE
            const res = await callAPI('getReportData');
            if (!res.people) {
                showCustomAlert('無法讀取名單。');
                btn.disabled = false; return btn.innerHTML = '<i class="bi bi-person-check-fill fs-5"></i> 進入系統';
            }
            const me = res.people.find(p => p.id === code);
            if (!me) {
                showCustomAlert('查無此 AGCODE，請確認輸入是否正確。');
                btn.disabled = false; return btn.innerHTML = '<i class="bi bi-person-check-fill fs-5"></i> 進入系統';
            }

            // 3. Find team from sessionStatus
            let teamFound = null;
            for (const team in sessionStatus.members) {
                if (sessionStatus.members[team].includes(me.name)) {
                    teamFound = team;
                    break;
                }
            }

            if (!teamFound) {
                showCustomAlert(` ${me.name} 您好，您尚未被配置到任何小組中。`);
                btn.disabled = false; return btn.innerHTML = '<i class="bi bi-person-check-fill fs-5"></i> 進入系統';
            }

            myTeam = teamFound;
            document.getElementById('team-info').textContent = myTeam;
            const myName = me.name;

            // Render member list
            const teamMembers = sessionStatus.members[myTeam] || [];
            const pillContainer = document.getElementById('member-pills-container');
            pillContainer.innerHTML = teamMembers.map(name =>
                `<span class="member-pill ${name === myName ? 'me' : ''}">${name === myName ? '✍️ ' : ''}${name}</span>`
            ).join('');
            document.getElementById('member-list-wrap').style.display = 'block';

            // 4. Check if already uploaded
            const uploadsRes = await callAPI('getWorkshopUploads');
            let alreadySubmittedData = null;
            if (uploadsRes.success && uploadsRes.uploads) {
                const sub = uploadsRes.uploads.find(u => u.team === myTeam);
                if (sub) alreadySubmittedData = sub.data;
            }

            // Transform to Stage 2 with animation
            const authSection = document.getElementById('auth-section');
            const submitSection = document.getElementById('submission-section');

            authSection.style.opacity = '0';
            authSection.style.transform = 'translateY(-20px)';

            setTimeout(() => {
                authSection.style.display = 'none';
                submitSection.style.display = 'block';
                void submitSection.offsetWidth;
                submitSection.style.opacity = '1';
                submitSection.style.transform = 'translateY(0)';

                if (alreadySubmittedData) {
                    const preview = document.getElementById('preview');
                    const textGroup = document.querySelector('.upload-text-group');
                    const mask = document.getElementById('success-mask');
                    const btn = document.getElementById('submit-btn');

                    preview.src = alreadySubmittedData;
                    preview.style.display = 'block';
                    textGroup.style.display = 'none';

                    document.querySelector('.success-overlay .fs-3').textContent = '已完成繳交';
                    document.querySelector('.success-overlay .text-muted').textContent = '檔案已鎖定，無法再次修改或上傳';

                    mask.classList.add('active');
                    btn.disabled = true;
                    btn.innerHTML = '<i class="bi bi-lock-fill fs-5"></i> 已由小組提交過檔案';
                    btn.style.background = '#94a3b8';
                }
            }, 400);

            syncSession();
            setInterval(syncSession, 3000);
        }

        async function syncSession() {
            const res = await callAPI('getWorkshopState');
            const interactiveForm = document.getElementById('interactive-form');
            if (res.success && res.state && res.state.active) {
                sessionStatus = res.state;
                document.getElementById('status-badge').className = 'status-pill status-active';
                document.getElementById('status-badge').innerHTML = '<i class="bi bi-broadcast"></i> 研討進行中';
                // Check if actually expired
                const elapsed = Math.floor((Date.now() - sessionStatus.startTime) / 1000);
                const remaining = sessionStatus.limit - elapsed;
                if (remaining <= 0 && interactiveForm) {
                    // Session ended after we logged in
                    interactiveForm.style.opacity = '0.5';
                    interactiveForm.style.pointerEvents = 'none';
                    document.getElementById('status-badge').className = 'status-pill status-waiting';
                    document.getElementById('status-badge').innerHTML = '<i class="bi bi-clock"></i> 繳交已結束';
                    // Show closed overlay
                    const co = document.getElementById('closed-overlay');
                    if (co && !document.getElementById('success-mask').classList.contains('active')) {
                        co.style.display = 'flex';
                    }
                } else {
                    interactiveForm.style.opacity = '1';
                    interactiveForm.style.pointerEvents = 'all';
                }
                updateTimer();
            } else {
                if (myTeam) {
                    // Was logged in but now inactive — show closed overlay
                    const co = document.getElementById('closed-overlay');
                    if (co && !document.getElementById('success-mask').classList.contains('active')) {
                        co.style.display = 'flex';
                    }
                }
                document.getElementById('status-badge').className = 'status-pill status-waiting';
                document.getElementById('status-badge').innerHTML = '<i class="bi bi-hourglass-split"></i> 等待研討開始';
                if (interactiveForm) {
                    interactiveForm.style.opacity = '0.5';
                    interactiveForm.style.pointerEvents = 'none';
                }
            }
        }

        function updateTimer() {
            if (!sessionStatus) return;
            const display = document.getElementById('countdown');

            if (!sessionStatus.startTime) {
                display.textContent = "等待計時";
                display.classList.remove('text-danger');
                return;
            }

            const elapsed = Math.floor((Date.now() - sessionStatus.startTime) / 1000);
            const remaining = sessionStatus.limit - elapsed;

            if (remaining <= 0) {
                display.textContent = "00:00";
                display.classList.add('text-danger');
                return;
            }

            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            display.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (remaining < 60) display.classList.add('text-danger');
            else display.classList.remove('text-danger');
        }

        async function submitFile() {
            if (!myTeam) return showCustomAlert('隊伍資訊異常，請嘗試重新登入。');
            if (!base64File) return showCustomAlert('請先選擇檔案');

            const btn = document.getElementById('submit-btn');
            const uploadZoneEl = document.getElementById('upload-zone');
            const uploadAnim = document.getElementById('upload-anim');
            const preview = document.getElementById('preview');
            const fileName = document.getElementById('file-name');
            const rotateBar = document.getElementById('rotate-bar');

            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-cloud-upload"></i> 傳輸中...';

            // Show upload animation
            preview.style.display = 'none';
            fileName.style.display = 'none';
            rotateBar.style.display = 'none';
            uploadAnim.style.display = 'flex';

            const res = await callAPI('submitWorkshopUpload', [{ team: myTeam, data: base64File }]);

            uploadAnim.style.display = 'none';

            if (res.success) {
                document.getElementById('success-mask').classList.add('active');

                const duration = 3000;
                const end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#0984e3', '#6c5ce7', '#00b894'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#0984e3', '#6c5ce7', '#00b894'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());

                btn.innerHTML = '<i class="bi bi-check2-all fs-5"></i> 傳送成功';
            } else {
                showCustomAlert('繳交失敗：' + res.message);
                preview.style.display = 'block';
                uploadAnim.style.display = 'none';
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send-fill fs-5"></i> 確認並提交';
            }
        }
    </script>
