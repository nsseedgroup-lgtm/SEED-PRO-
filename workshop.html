<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&H Workshop - 繳交端</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Noto+Sans+TC:wght@300;500;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2d3436;
            --primary-dark: #1e2527;
            --bg-dark: #fcfcfc;
            --glass-bg: #ffffff;
            --glass-border: #f0f0f0;
            --text-main: #2d3436;
            --text-muted: #636e72;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .workshop-client-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .status-pill {
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 24px;
        }

        .status-waiting {
            background: #fee2e2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }

        .status-active {
            background: #dcfce7;
            color: #22c55e;
            border: 1px solid #bbf7d0;
            animation: pulse 2s infinite;
        }

        .status-locked {
            background: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .timer-display {
            font-size: 5rem;
            font-weight: 950;
            color: var(--primary-dark);
            margin: 30px 0;
            letter-spacing: -2px;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            font-family: 'JetBrains Mono', monospace;
        }

        .team-select {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 24px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }

        .team-select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 30px;
            padding: 50px 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            background: #f8fafc;
            overflow: hidden;
        }

        .upload-area:hover:not(.disabled) {
            border-color: var(--primary);
            background: #f1f5f9;
            transform: scale(1.02);
        }

        .upload-area.disabled {
            cursor: not-allowed;
            opacity: 0.3;
            filter: grayscale(1);
        }

        .upload-icon {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .upload-area:hover .upload-icon {
            color: var(--primary);
            transform: translateY(-5px);
        }

        #file-input {
            display: none;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 24px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            object-fit: contain;
        }

        /* Login Stage */
        #auth-section {
            display: block;
        }

        #submission-section {
            display: none;
        }

        .login-input {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            font-size: 2rem;
            font-weight: 950;
            text-align: center;
            width: 100%;
            margin-bottom: 25px;
            letter-spacing: 8px;
            transition: 0.3s;
            color: var(--primary-dark);
            font-family: 'JetBrains Mono', monospace;
        }

        .login-input:focus {
            border-color: var(--primary);
            background: #ffffff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(45, 52, 54, 0.1);
        }

        .team-display-pill {
            background: var(--primary);
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 1.3rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .success-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(34, 197, 94, 0.95);
            border-radius: 24px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div class="workshop-client-card">
        <div id="status-badge" class="status-pill status-waiting">等待研討開始</div>

        <h1 class="fw-950 mb-1 text-dark">A&H 工作坊</h1>
        <p class="text-muted small mb-4">研討會 協作產出提交系統</p>

        <!-- Stage 1: Auth -->
        <div id="auth-section">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock text-primary display-4 opacity-50"></i>
                <h4 class="fw-800 mt-2">身份驗證</h4>
                <p class="text-muted small">請輸入您的 AGCODE 以辨識分組</p>
            </div>
            <input type="text" id="agcode-input" class="login-input" placeholder="000000" maxlength="10">
            <button class="btn-submit" onclick="loginByAGCODE()">
                <i class="bi bi-person-check-fill"></i> 進入系統
            </button>
        </div>

        <!-- Stage 2: Submission -->
        <div id="submission-section">
            <div id="team-info" class="team-display-pill">--</div>
            <div id="countdown" class="timer-display">--:--</div>

            <div id="interactive-form">
                <div id="upload-zone" class="upload-area" onclick="document.getElementById('file-input').click()">
                    <div class="upload-icon"><i class="bi bi-cloud-arrow-up-fill"></i></div>
                    <div class="fw-800 text-dark">點擊或拖放檔案</div>
                    <div class="text-muted small">僅支援圖片格式 (PNG, JPG)</div>
                    <input type="file" id="file-input" accept="image/*">

                    <img id="preview" class="preview-img">

                    <div id="success-mask" class="success-overlay">
                        <i class="bi bi-check-circle-fill display-4 mb-2"></i>
                        <div class="fw-950 fs-4">繳交成功</div>
                        <div class="small">已鎖定，不可更換檔案</div>
                    </div>
                </div>

                <button id="submit-btn" class="btn-submit" onclick="submitFile()" disabled>
                    <i class="bi bi-send-fill"></i> 立即繳交
                </button>
            </div>

            <button class="btn btn-link btn-sm text-muted mt-4 text-decoration-none" onclick="location.reload()">
                <i class="bi bi-arrow-left"></i> 切換人員
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz4kiWGCG96zZHAJgc-wOAaCxOkS7WXf5IriAEKk0StXYFNVlME7x2SjaSva3Rp8obX/exec';
        let sessionStatus = null;
        let timerInterval = null;
        let base64File = null;
        let myTeam = null;
        let participants = [];

        async function callAPI(action, args = []) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, args })
                });
                return await response.json();
            } catch (err) {
                console.error('API Error:', err);
                return { success: false, message: '網路連線異常' };
            }
        }

        async function loginByAGCODE() {
            const code = document.getElementById('agcode-input').value.trim();
            if (!code) return alert('請輸入 AGCODE');

            const btn = document.querySelector('#auth-section .btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 驗證中...';

            // 1. Fetch live state to see teams/members
            const stateRes = await callAPI('getWorkshopState');
            if (!stateRes.success || !stateRes.state) {
                alert('研討會尚未啟動或後端故障。');
                btn.disabled = false; return btn.innerHTML = '<i class="bi bi-person-check-fill"></i> 進入系統';
            }
            sessionStatus = stateRes.state;

            // 2. Fetch master list to identify person by AGCODE
            const res = await callAPI('getReportData');
            if (!res.people) {
                alert('無法讀取學員名標。');
                btn.disabled = false; return btn.innerHTML = '<i class="bi bi-person-check-fill"></i> 進入系統';
            }
            const me = res.people.find(p => p.id === code);
            if (!me) {
                alert('查無此 AGCODE，請確認輸入。');
                btn.disabled = false; return btn.innerHTML = '<i class="bi bi-person-check-fill"></i> 進入系統';
            }

            // 3. Find team from sessionStatus
            let teamFound = null;
            for (const team in sessionStatus.members) {
                if (sessionStatus.members[team].includes(me.name)) {
                    teamFound = team;
                    break;
                }
            }

            if (!teamFound) {
                alert(`學員 ${me.name} 您好，但您尚未被配置到任何小組。`);
                btn.disabled = false; return btn.innerHTML = '<i class="bi bi-person-check-fill"></i> 進入系統';
            }

            myTeam = teamFound;
            document.getElementById('team-info').textContent = myTeam;
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('submission-section').style.display = 'block';

            syncSession();
            // Start Polling for Timer/Session Status
            setInterval(syncSession, 3000);
        }

        async function syncSession() {
            const res = await callAPI('getWorkshopState');
            if (res.success && res.state) {
                sessionStatus = res.state;
                document.getElementById('status-badge').className = 'status-pill status-active';
                document.getElementById('status-badge').textContent = '研討進行中';
                document.getElementById('interactive-form').style.opacity = '1';
                document.getElementById('interactive-form').style.pointerEvents = 'all';
                updateTimer();
            } else {
                document.getElementById('status-badge').className = 'status-pill status-waiting';
                document.getElementById('status-badge').textContent = '等待研討開始';
                document.getElementById('interactive-form').style.opacity = '0.5';
                document.getElementById('interactive-form').style.pointerEvents = 'none';
            }
        }

        function updateTimer() {
            if (!sessionStatus) return;
            const display = document.getElementById('countdown');

            if (!sessionStatus.startTime) {
                display.textContent = "等待計時";
                display.classList.remove('text-danger');
                return;
            }

            const elapsed = Math.floor((Date.now() - sessionStatus.startTime) / 1000);
            const remaining = sessionStatus.limit - elapsed;

            if (remaining <= 0) {
                display.textContent = "00:00";
                display.classList.add('text-danger');
                return;
            }

            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            display.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (remaining < 60) display.classList.add('text-danger');
            else display.classList.remove('text-danger');
        }

        // File Handler
        document.getElementById('file-input').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (event) {
                base64File = event.target.result;
                const preview = document.getElementById('preview');
                preview.src = base64File;
                preview.style.display = 'block';
                document.getElementById('submit-btn').disabled = false;
            };
            reader.readAsDataURL(file);
        });

        async function submitFile() {
            if (!myTeam) return alert('隊伍資訊異常，請嘗試重新登入。');
            if (!base64File) return alert('請先選擇檔案');

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 上傳成果中...';

            const res = await callAPI('submitWorkshopUpload', [{ team: myTeam, data: base64File }]);

            if (res.success) {
                document.getElementById('success-mask').classList.add('active');
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.7 } });
                btn.innerHTML = '已成功繳交';
            } else {
                alert('繳交失敗：' + res.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send-fill"></i> 立即繳交';
            }
        }
    </script>
</body>

</html>
