<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菁英榮譽榜 | Seed Pro+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-dark: #0f172a;
            --accent-gold: #f59e0b;
            --accent-silver: #94a3b8;
            --accent-bronze: #d97706;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            background: #f8fafc;
            color: var(--primary-dark);
            font-family: "Outfit", "Noto Sans TC", sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .hero-section {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 80px 0 160px;
            text-align: center;
            color: white;
            position: relative;
            clip-path: ellipse(150% 100% at 50% 0%);
        }

        .hero-title {
            font-weight: 950;
            font-size: 4rem;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .podium-container {
            margin-top: -100px;
            position: relative;
            z-index: 10;
        }

        .podium-card {
            background: white;
            border-radius: 40px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .podium-card:hover {
            transform: translateY(-15px);
        }

        .rank-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 950;
            font-size: 1.5rem;
            margin: -70px auto 20px;
            border: 5px solid white;
            color: white;
        }

        .rank-1 .rank-circle {
            background: var(--accent-gold);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.4);
        }

        .rank-2 .rank-circle {
            background: var(--accent-silver);
            box-shadow: 0 10px 20px rgba(148, 163, 184, 0.4);
        }

        .rank-3 .rank-circle {
            background: var(--accent-bronze);
            box-shadow: 0 10px 20px rgba(217, 119, 6, 0.4);
        }

        .rank-1 {
            transform: scale(1.15);
            z-index: 2;
            border: 2px solid var(--accent-gold);
        }

        .avatar-wrap {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 10px;
        }

        .name-text {
            font-weight: 900;
            font-size: 1.75rem;
            margin-bottom: 5px;
        }

        .group-text {
            font-weight: 700;
            color: #64748b;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .points-pill {
            display: inline-block;
            background: #f1f5f9;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 950;
            margin-top: 15px;
            color: var(--primary-dark);
        }

        .list-section {
            background: white;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid #f1f5f9;
            transition: 0.2s;
            font-weight: 700;
        }

        .list-item:hover {
            background: #f8fafc;
            border-radius: 15px;
            transform: scale(1.01);
        }

        .item-rank {
            width: 50px;
            font-weight: 950;
            color: #94a3b8;
        }

        .item-name {
            flex-grow: 1;
            font-size: 1.1rem;
        }

        .item-group {
            width: 150px;
            color: #64748b;
            font-size: 0.9rem;
        }

        .item-pts {
            font-weight: 950;
            color: var(--accent-gold);
            font-size: 1.25rem;
        }

        .ceremony-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .mvp-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 60px;
            margin-top: 30px;
            transform: scale(0.5);
            opacity: 0;
            transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mvp-card.show {
            transform: scale(1);
            opacity: 1;
        }

        @keyframes shine {
            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        .text-shine {
            background: linear-gradient(90deg, #fff, #fbbf24, #fff);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            font-weight: 950;
        }
    </style>
</head>

<body>
    <div class="hero-section">
        <div class="container">
            <h1 class="hero-title">菁英榮譽榜</h1>
            <p class="fs-5 opacity-75 fw-bold">TMS SEED PRO+ | EXCELLENCE IS A HABIT</p>
        </div>
    </div>

    <div class="container podium-container">
        <div class="row g-5 justify-content-center align-items-end" id="podium-row">
            <!-- Podium injected here -->
        </div>

        <div class="list-section mt-5 mb-5">
            <div class="d-flex justify-content-between align-items-center mb-4 px-3">
                <h3 class="fw-950 mb-0">排行榜</h3>
                <span class="badge bg-light text-dark border p-2 px-3 rounded-pill fw-bold">TOP 20 PARTICIPANTS</span>
            </div>
            <div id="rank-list" class="px-2">
                <!-- List items injected here -->
            </div>
            <div id="empty-state" class="text-center py-5" style="display:none;">
                <i class="bi bi-trophy display-1 text-muted opacity-25"></i>
                <h4 class="mt-3 fw-bold text-muted">目前暫無積分紀錄</h4>
            </div>
        </div>
    </div>

    <div id="ceremony-overlay" class="ceremony-overlay" onclick="this.style.display='none'">
        <h2 class="text-shine display-4 mb-5">SESSION VICTOR</h2>
        <div id="ceremony-content" class="d-flex justify-content-center align-items-end gap-5"></div>
        <div class="mt-5 text-white-50 fw-bold">點擊任意處返回</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        function updateHonorRoll() {
            const raw = localStorage.getItem('seedpro_session_scores');
            const data = raw ? JSON.parse(raw) : [];
            const sorted = data.sort((a, b) => b.points - a.points);

            renderPodium(sorted.slice(0, 3));
            renderList(sorted.slice(3, 20));

            document.getElementById('empty-state').style.display = sorted.length === 0 ? 'block' : 'none';
        }

        function renderPodium(top3) {
            const row = document.getElementById('podium-row');
            if (top3.length === 0) { row.innerHTML = ''; return; }

            const orders = [
                { idx: 1, rank: 2, order: 1, col: 'col-md-3' }, // 2nd
                { idx: 0, rank: 1, order: 2, col: 'col-md-4' }, // 1st
                { idx: 2, rank: 3, order: 3, col: 'col-md-3' }  // 3rd
            ];

            row.innerHTML = orders.map(o => {
                const p = top3[o.idx];
                if (!p) return `<div class="${o.col}" style="order: ${o.order}"></div>`;
                return `
                    <div class="${o.col}" style="order: ${o.order}">
                        <div class="podium-card rank-${o.rank}">
                            <div class="rank-circle">${o.rank}</div>
                            <div class="avatar-wrap"><i class="bi bi-person-circle"></i></div>
                            <div class="name-text">${p.name}</div>
                            <div class="group-text">${p.group || '小組'}</div>
                            <div class="points-pill">🔥 ${p.points} PTS</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderList(remaining) {
            const el = document.getElementById('rank-list');
            el.innerHTML = remaining.map((p, i) => `
                <div class="list-item">
                    <div class="item-rank">#${i + 4}</div>
                    <div class="item-name">${p.name}</div>
                    <div class="item-group">${p.group || ''}</div>
                    <div class="item-pts">${p.points}</div>
                </div>
            `).join('');
        }

        // Ceremony Monitoring
        function checkCeremony() {
            const trigger = localStorage.getItem('seedpro_ceremony_trigger');
            if (trigger) {
                const data = JSON.parse(trigger);
                if (Date.now() - data.timestamp < 10000) {
                    localStorage.removeItem('seedpro_ceremony_trigger');
                    startCeremony(data.winners);
                }
            }
        }

        function startCeremony(winners) {
            const overlay = document.getElementById('ceremony-overlay');
            const content = document.getElementById('ceremony-content');

            overlay.style.display = 'flex';
            content.innerHTML = '';

            const trophy = ['🥈', '🥇', '🥉'];
            const scale = [0.85, 1.1, 0.75];
            const order = [1, 0, 2]; // 0 is 1st (middle), 1 is 2nd (left), 2 is 3rd (right)

            [1, 0, 2].forEach((idx) => {
                const p = winners[idx];
                if (!p) return;
                const card = document.createElement('div');
                card.className = 'mvp-card';
                card.style.transform = `scale(${scale[idx]})`;
                card.style.order = idx === 0 ? 2 : (idx === 1 ? 1 : 3);
                card.innerHTML = `
                    <div style="font-size: 5rem; margin-bottom: 20px;">${trophy[idx]}</div>
                    <h2 class="name-text" style="font-size: 3.5rem;">${p.name}</h2>
                    <h4 class="text-shine">SCORE: ${p.score || p.points || 0}</h4>
                `;
                content.appendChild(card);
                setTimeout(() => card.classList.add('show'), 100 * idx);
            });

            // Effects
            const count = 200;
            const defaults = { origin: { y: 0.7 } };
            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, { particleCount: Math.floor(count * particleRatio) }));
            }
            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });

            const sound = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');
            sound.play().catch(() => { });
        }

        window.onload = () => {
            updateHonorRoll();
            setInterval(updateHonorRoll, 2000);
            setInterval(checkCeremony, 1000);
        };
    </script>
</body>

</html>
