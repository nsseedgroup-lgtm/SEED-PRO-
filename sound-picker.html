<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簽到動效挑選器 | TMS Pro+ Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-dark: #2d3436;
            --primary-bg: #fcfcfc;
            --accent-green: #00b894;
            --border-color: #f0f0f0;
        }

        body {
            background-color: var(--primary-bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(0, 184, 148, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(9, 132, 227, 0.03) 0px, transparent 50%);
            color: var(--primary-dark);
            font-family: "Inter", "Noto Sans TC", sans-serif;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .header-section {
            padding: 40px 0 30px;
            text-align: center;
        }

        .header-section h1 {
            font-weight: 950;
            letter-spacing: -1px;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        /* Preview Area */
        .preview-box {
            background: white;
            border: 2px dashed #ddd;
            border-radius: 24px;
            height: 250px;
            margin-bottom: 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.02);
        }

        /* --- 10 Types of Entry Animations --- */
        .preview-banner {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.1);
            position: absolute;
            z-index: 10;
        }

        /* 1. Classic Spring */
        @keyframes anim-classic {
            0% {
                transform: translateX(-150%) scale(0.9);
                opacity: 0;
            }

            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        /* 2. Bottom Float */
        @keyframes anim-bottom {
            0% {
                transform: translateY(150%) scale(0.9);
                opacity: 0;
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* 3. Center Pop */
        @keyframes anim-pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            80% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 4. Glass Flip */
        @keyframes anim-flip {
            0% {
                transform: rotateX(90deg);
                opacity: 0;
            }

            100% {
                transform: rotateX(0deg);
                opacity: 1;
            }
        }

        /* 5. Blur In */
        @keyframes anim-blur {
            0% {
                filter: blur(20px);
                opacity: 0;
                transform: scale(1.2);
            }

            100% {
                filter: blur(0);
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 6. Rotate Roll */
        @keyframes anim-roll {
            0% {
                transform: translateX(-100%) rotate(-180deg);
                opacity: 0;
            }

            100% {
                transform: translateX(0) rotate(0deg);
                opacity: 1;
            }
        }

        /* 7. Top Slide */
        @keyframes anim-top {
            0% {
                transform: translateY(-150%);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 8. Pulse Expand */
        @keyframes anim-pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.4);
                transform: scale(0.9);
                opacity: 0;
            }

            100% {
                box-shadow: 0 0 0 30px rgba(0, 184, 148, 0);
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 9. Zoom Reveal */
        @keyframes anim-zoom {
            0% {
                clip-path: circle(0% at 50% 50%);
                opacity: 0;
            }

            100% {
                clip-path: circle(100% at 50% 50%);
                opacity: 1;
            }
        }

        /* 10. Cyber Bounce */
        @keyframes anim-bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-30px);
            }

            60% {
                transform: translateY(-15px);
            }
        }

        .sound-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            height: 100%;
        }

        .sound-card:hover {
            border-color: var(--accent-green);
            background: #f9fdfc;
        }

        .sound-card.active {
            border: 2px solid var(--accent-green);
            background: #f0f9f7;
        }

        .btn-confirm {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            background: var(--primary-dark);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: none;
            z-index: 1000;
        }

        .type-badge {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            margin-bottom: 5px;
            display: block;
            color: #b2bec3;
        }
    </style>
</head>

<body>

    <div class="container py-4">
        <div class="header-section">
            <h1>簽到動效挑選器</h1>
            <p>點擊下方按鈕試聽音效並查看對應動畫</p>
        </div>

        <!-- Live Preview Area -->
        <div class="preview-box" id="previewBox">
            <div id="activeBannerPlaceholder"></div>
            <p class="text-muted" id="previewText">點擊下方選項預覽特效</p>
        </div>

        <div class="row g-3">
            <!-- 10 Audio + Animation Combos -->
            <div class="col-md-3 col-6">
                <div class="sound-card" onclick="playEffect(1, 'anim-classic')">
                    <span class="type-badge">Classic</span>
                    <i class="bi bi-bell-fill mb-2 d-block"></i>
                    <div>經典櫃檯鈴</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sound-card" onclick="playEffect(2, 'anim-bottom')">
                    <span class="type-badge">Gentle</span>
                    <i class="bi bi-door-open-fill mb-2 d-block"></i>
                    <div>溫馨門鈴聲</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sound-card" onclick="playEffect(3, 'anim-pop')">
                    <span class="type-badge">Minimal</span>
                    <i class="bi bi-fingerprint mb-2 d-block"></i>
                    <div>清脆小按鈕</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sound-card" onclick="playEffect(4, 'anim-flip')">
                    <span class="type-badge">Mech</span>
                    <i class="bi bi-camera-fill mb-2 d-block"></i>
                    <div>專業閃光燈</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sound-card" onclick="playEffect(5, 'anim-blur')">
                    <span class="type-badge">Fun</span>
                    <i class="bi bi-chat-heart-fill mb-2 d-block"></i>
                    <div>氣泡彈跳</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sound-card" onclick="playEffect(6, 'anim-roll')">
                    <span class="type-badge">Natural</span>
                    <i class="bi bi-droplet-fill mb-2 d-block"></i>
                    <div>水滴落聲</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sound-card" onclick="playEffect(7, 'anim-top')">
                    <span class="type-badge">Action</span>
                    <i class="bi bi-record-circle-fill mb-2 d-block"></i>
                    <div>快門聲</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sound-card" onclick="playEffect(8, 'anim-pulse')">
                    <span class="type-badge">Subtle</span>
                    <i class="bi bi-hand-index-thumb-fill mb-2 d-block"></i>
                    <div>輕型敲擊</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sound-card" onclick="playEffect(9, 'anim-zoom')">
                    <span class="type-badge">Premium</span>
                    <i class="bi bi-gem mb-2 d-block"></i>
                    <div>玻璃清脆</div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sound-card" onclick="playEffect(10, 'anim-bounce')">
                    <span class="type-badge">Tech</span>
                    <i class="bi bi-cpu-fill mb-2 d-block"></i>
                    <div>數位成功音</div>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-confirm" onclick="applyAndGo()">套用所選並返回監控頁面</button>

    <script>
        const soundData = {
            1: { name: '經典櫃檯鈴', url: 'https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.7/sounds/bell_ring.mp3', confetti: 'classic' },
            2: { name: '溫馨門鈴聲', url: 'https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.7/sounds/door_bell.mp3', confetti: 'gentle' },
            3: { name: '清脆小按鈕', url: 'https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.7/sounds/button_tiny.mp3', confetti: 'minimal' },
            4: { name: '專業閃光燈', url: 'https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.7/sounds/camera_flashing.mp3', confetti: 'mech' },
            5: { name: '氣泡彈跳', url: 'https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.7/sounds/pop_drop.mp3', confetti: 'fun' },
            6: { name: '水滴落聲', url: 'https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.7/sounds/water_droplet.mp3', confetti: 'natural' },
            7: { name: '快門聲', url: 'https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.7/sounds/snap.mp3', confetti: 'action' },
            8: { name: '輕型敲擊', url: 'https://cdnjs.cloudflare.com/ajax/libs/ion-sound/3.0.7/sounds/tap.mp3', confetti: 'subtle' },
            9: { name: '玻璃清脆', url: 'https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3', confetti: 'premium' },
            10: { name: '數位成功音', url: 'https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3', confetti: 'tech' }
        };

        let selectedEffect = { id: 1, anim: 'anim-classic' };

        function playEffect(id, animClass) {
            selectedEffect = { id, anim: animClass };
            document.getElementById('previewText').style.display = 'none';

            // Cleanup
            const oldBanner = document.querySelector('.preview-banner');
            if (oldBanner) oldBanner.remove();

            // Create Banner
            const banner = document.createElement('div');
            banner.className = 'preview-banner';
            banner.style.animation = `${animClass} 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards`;
            banner.innerHTML = `
                <div style="width:40px;height:40px;background:#2d3436;border-radius:50%;color:white;display:flex;align-items:center;justify-content:center;">
                    <i class="bi bi-person-check"></i>
                </div>
                <div>
                    <div style="font-size:0.6rem;color:#00b894;font-weight:800;">TEST PERSON</div>
                    <div style="font-weight:900;">試聽人員 - ${soundData[id].name}</div>
                </div>
            `;
            document.getElementById('previewBox').appendChild(banner);

            // Play Sound
            const audio = new Audio(soundData[id].url);
            audio.play().catch(e => console.log('Audio unlock needed'));

            // Highlight Card
            document.querySelectorAll('.sound-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Trigger Confetti
            triggerConfetti(soundData[id].confetti);
        }

        function triggerConfetti(type) {
            const defaults = { spread: 360, ticks: 50, gravity: 0.8, decay: 0.94, startVelocity: 30, shapes: ['star'], colors: ['FFE400', 'FFBD00', 'E89400', 'FFCA6C', 'FDFFB8'] };
            if (type === 'premium') confetti({ ...defaults, particleCount: 100, scalar: 1.2 });
            else if (type === 'fun') confetti({ particleCount: 50, spread: 70, origin: { y: 0.6 } });
            else confetti({ particleCount: 30, origin: { y: 0.6 } });
        }

        function applyAndGo() {
            const data = soundData[selectedEffect.id];
            localStorage.setItem('monitor_preferred_sound', data.url);
            localStorage.setItem('monitor_preferred_anim', selectedEffect.anim);
            localStorage.setItem('monitor_preferred_name', data.name);

            alert(`已套用生效！\n音效：${data.name}\n動畫：${selectedEffect.anim}`);
            window.location.href = './monitor.html';
        }

        window.onclick = () => {
            const a = new Audio();
            a.volume = 0;
            a.play().catch(() => { });
        };
    </script>
</body>

</html>
